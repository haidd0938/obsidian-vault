# 公司资质配置 — 用于项目备案匹配
# 你弟弟可以根据自己公司的实际情况修改这个文件

[company]
# 公司名称
name = 甘肃东盛建筑设计有限公司

# 注册地址
address = 甘肃省天水市秦州区精表路29号

# 公司资质关键词（用于匹配项目名称和内容）
# 系统会自动检测项目名称/内容中是否包含这些词
keywords =
    建筑设计,工程设计,房屋建筑,房建,
    市政工程,公路工程,水利水电,消防设施,
    建筑智能化,城乡规划,旅游规划,土地规划,
    风景园林,岩土工程,工程勘察,工程测量,
    工程监理,造价咨询,可研报告,项目管理,
    安全评价,环境评价,地质灾害,
    施工总承包,特种工程,土石方

# 优先关注的地区（按优先级排序）
preferred_regions = 天水,陇南,定西

# 每天几点执行抓取（24小时制）
run_hour = 8
run_minute = 0

# 输出目录（存放每日抓取结果）
output_dir = ./output

# 是否保存JSON格式（供其他程序处理）
save_json = true

# 是否保存文本格式（人工阅读）
save_text = true
